version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ward_db
    environment:
      POSTGRES_USER: ward_user
      POSTGRES_PASSWORD: ward_pass
      POSTGRES_DB: ward_db
    ports:
      - "5432:5432"
    volumes:
      - ward_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ward_user -d ward_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ward_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ward_user:ward_pass@db:5432/ward_db
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ward_web
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ward_pg_data:
